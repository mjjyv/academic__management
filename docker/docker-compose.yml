services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: uni_it_sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=P@ssword
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - uni_network

  backend:
    build: .././stdmanager  # Đường dẫn tới thư mục chứa code backend
    container_name: uni_it_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=stdmanager_db;trustServerCertificate=true
    depends_on:
      - sqlserver
    networks:
      - uni_network

  frontend:
    build: .././frontend    # Đường dẫn tới thư mục chứa code frontend
    container_name: uni_it_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - uni_network

networks:
  uni_network:
    driver: bridge

volumes:
  mssql_data: